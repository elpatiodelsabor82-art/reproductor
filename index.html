<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <video id="player-pro" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        let url = params.get('video');

        if (url) {
            const player = videojs('player-pro');
            let type = 'video/mp4'; // Default

            // INTELIGENCIA DE DETECCIÓN
            if (url.includes('drive.google.com')) {
                // Para Drive, se intenta convertir el link a formato de visualización directa
                url = url.replace('/view?usp=sharing', '').replace('/file/d/', '/uc?export=view&id=').replace('/view', '');
            } else if (url.includes('.m3u8')) {
                type = 'application/x-mpegURL';
            } else if (url.includes('.mkv')) {
                type = 'video/x-matroska';
            }

            player.src({ src: url, type: type });
            player.play().catch(e => console.log("Esperando interacción"));
        }
    </script>
</body>
</html>
