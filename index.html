<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO Custom</title>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- DASH -->
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
}

/* CONTENEDOR */
#player {
    position: relative;
    width: 100%;
    height: 100vh;
    background: black;
}

/* VIDEO */
video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
}

/* CAPA CONTROLES */
.controls {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    box-sizing: border-box;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    opacity: 0;
    transition: 0.3s;
}

/* MOSTRAR CONTROLES */
#player:hover .controls {
    opacity: 1;
}

/* BOTONES */
.btn {
    color: white;
    font-size: 18px;
    cursor: pointer;
    margin-right: 15px;
}

/* BARRA */
.progress {
    width: 100%;
    height: 5px;
    background: rgba(255,255,255,0.3);
    cursor: pointer;
    margin-bottom: 10px;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: red;
}

/* CENTRO PLAY */
.center-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
}

.center-play::before {
    content: '';
    margin-left: 5px;
    border-left: 25px solid white;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
}

.hidden {
    display: none;
}
</style>
</head>

<body oncontextmenu="return false">

<div id="player">

    <video id="video"></video>

    <!-- BOTÓN CENTRAL -->
    <div id="centerPlay" class="center-play"></div>

    <!-- CONTROLES -->
    <div class="controls">

        <div class="progress" id="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <span class="btn" id="playBtn">▶</span>
        <span class="btn" id="muteBtn">🔊</span>
        <span class="btn" id="fullscreenBtn">⛶</span>

    </div>

</div>

<script>
const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const muteBtn = document.getElementById("muteBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const centerPlay = document.getElementById("centerPlay");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");

// URL
const params = new URLSearchParams(window.location.search);
let url = params.get("video");

// DETECTAR
function tipo(u) {
    u = u.toLowerCase();
    if (u.includes(".m3u8")) return "hls";
    if (u.includes(".mpd")) return "dash";
    return "mp4";
}

// CARGAR
function cargar(url) {

    const t = tipo(url);

    if (t === "hls") {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else {
            video.src = url;
        }
    }

    else if (t === "dash") {
        const player = dashjs.MediaPlayer().create();
        player.initialize(video, url, false);
    }

    else {
        video.src = url;
    }
}

cargar(url);

// PLAY / PAUSE
function togglePlay() {
    if (video.paused) {
        video.play();
    } else {
        video.pause();
    }
}

playBtn.onclick = togglePlay;
centerPlay.onclick = togglePlay;
video.onclick = togglePlay;

// ICONOS
video.addEventListener("play", () => {
    playBtn.textContent = "⏸";
    centerPlay.classList.add("hidden");
});

video.addEventListener("pause", () => {
    playBtn.textContent = "▶";
    centerPlay.classList.remove("hidden");
});

// MUTE
muteBtn.onclick = () => {
    video.muted = !video.muted;
    muteBtn.textContent = video.muted ? "🔇" : "🔊";
};

// FULLSCREEN
fullscreenBtn.onclick = () => {
    if (!document.fullscreenElement) {
        document.getElementById("player").requestFullscreen();
    } else {
        document.exitFullscreen();
    }
};

// PROGRESO
video.addEventListener("timeupdate", () => {
    const percent = (video.currentTime / video.duration) * 100;
    bar.style.width = percent + "%";
});

// SEEK
progress.onclick = (e) => {
    const rect = progress.getBoundingClientRect();
    const pos = (e.clientX - rect.left) / rect.width;
    video.currentTime = pos * video.duration;
};
</script>

</body>
</html>
