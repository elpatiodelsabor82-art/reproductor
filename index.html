<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Player PRO</title>

<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet"/>
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

<!-- HLS + DASH soporte -->
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-quality-levels@2"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-http-streaming@3"></script>
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
body {
    margin: 0;
    background: #000;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* PLAYER */
.video-js {
    width: 100% !important;
    height: 100% !important;
}

/* CONTROLES MORADOS */
.vjs-control-bar {
    background: rgba(40, 0, 60, 0.8) !important;
}

.vjs-play-control,
.vjs-volume-panel,
.vjs-fullscreen-control,
.vjs-progress-control {
    color: #bb86fc !important;
}

.vjs-play-progress {
    background-color: #bb86fc !important;
}

.vjs-volume-level {
    background-color: #bb86fc !important;
}

/* BOTÓN CENTRAL PERSONALIZADO */
#bigPlay {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(128, 0, 255, 0.4);
    border: 2px solid #bb86fc;
    padding: 20px 40px;
    font-size: 24px;
    color: #fff;
    cursor: pointer;
    border-radius: 8px;
    backdrop-filter: blur(5px);
    z-index: 10;
}

#bigPlay:hover {
    background: rgba(128, 0, 255, 0.7);
}

/* OCULTAR CUANDO REPRODUCE */
.hidden {
    display: none;
}
</style>
</head>

<body>

<video id="player-pro" class="video-js vjs-default-skin" controls preload="auto"></video>

<div id="bigPlay">▶ PLAY</div>

<script>
const params = new URLSearchParams(window.location.search);
let url = params.get('video');

const player = videojs('player-pro');
const bigPlay = document.getElementById('bigPlay');

function detectarTipo(url) {
    if (!url) return null;

    if (url.includes('.m3u8')) return 'application/x-mpegURL';
    if (url.includes('.mpd')) return 'application/dash+xml';
    if (url.includes('.webm')) return 'video/webm';
    if (url.includes('.mkv')) return 'video/mp4'; // fallback
    if (url.includes('drive.google.com')) return 'video/mp4';

    return 'video/mp4';
}

function arreglarDrive(url) {
    if (!url.includes('drive.google.com')) return url;

    let match = url.match(/\/d\/(.*?)\//);
    if (match && match[1]) {
        return `https://drive.google.com/uc?export=download&id=${match[1]}`;
    }

    return url;
}

if (url) {
    url = arreglarDrive(url);

    const type = detectarTipo(url);

    player.src({
        src: url,
        type: type
    });

    player.ready(() => {
        player.pause();
    });
} else {
    alert("No se recibió URL de video");
}

/* BOTÓN CENTRAL */
bigPlay.addEventListener('click', () => {
    player.play();
});

player.on('play', () => {
    bigPlay.classList.add('hidden');
});

player.on('pause', () => {
    bigPlay.classList.remove('hidden');
});

player.on('error', () => {
    console.log("Error cargando video");
});
</script>

</body>
</html>
