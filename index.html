<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <video id="myPlayer" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('video');
        
        if (videoUrl) {
            const player = videojs('myPlayer');
            
            // Cargamos el video directamente sin pasar por ninguna URL externa
            player.src({ src: videoUrl, type: 'video/mp4' }); // video/mp4 es el estándar, video.js lo ajustará
            
            player.play().catch(e => console.log("Se requiere interacción del usuario para reproducir"));
        }
    </script>
</body>
</html>
