<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        #overlay { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; z-index: 2000; }
        #btn-entrar { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #8e44ad; color: white; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        #timer { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; z-index: 10; display: none; }
    </style>
</head>
<body>
    <div id="overlay"><button id="btn-entrar">VER ESTRENO</button></div>
    <div id="timer">Publicidad: <span id="seg">21</span>s</div>
    <iframe id="videoFrame" allow="autoplay; fullscreen" allowfullscreen sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"></iframe>

    <script>
    const params = new URLSearchParams(window.location.search + window.location.hash.replace('#', '&'));
    const videoUrl = params.get('video');
    const adUrl = params.get('ad');
    
    const iframe = document.getElementById('videoFrame');
    const timerDiv = document.getElementById('timer');
    const segSpan = document.getElementById('seg');
    const overlay = document.getElementById('overlay');

    document.getElementById('btn-entrar').onclick = () => {
        overlay.style.display = 'none'; 
        iframe.style.display = 'block'; 
        
        if (videoUrl) {
            if (adUrl) {
                // Forzamos el autoplay agregándolo correctamente al final
                let cleanAdUrl = adUrl.includes('?') ? adUrl + '&autoplay=1' : adUrl + '?autoplay=1';
                iframe.src = cleanAdUrl;
                
                timerDiv.style.display = 'block';
                let timeLeft = 21; 
                
                const countdown = setInterval(() => {
                    timeLeft--;
                    segSpan.innerText = timeLeft;
                  if (timeLeft <= 0) {
                            clearInterval(countdown);
                            timerDiv.style.display = 'none';
                            iframe.src = videoUrl;
                        }
                    }, 1000);
                }
    else {
                let cleanVideoUrl = videoUrl.includes('?') ? videoUrl + '&autoplay=1' : videoUrl + '?autoplay=1';
                iframe.src = cleanVideoUrl;
            }
        }
    };
</script>
</body>
</html>
