<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; display: none; }
        #overlay { 
            position: absolute; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center; 
            background: #000; z-index: 2000; 
        }
        #btn-entrar { 
            padding: 20px 40px; font-size: 20px; cursor: pointer; 
            background: #e50914; color: white; border: none; border-radius: 5px;
            font-weight: bold; text-transform: uppercase;
        }
        #timer { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.8); color: white; 
            padding: 10px; border-radius: 5px; z-index: 10; display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-entrar">VER ESTRENO</button>
    </div>

    <div id="timer">Publicidad: <span id="seg">7</span>s</div>

    <iframe id="videoFrame" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen 
            sandbox="allow-forms allow-scripts allow-same-origin allow-presentation">
    </iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        const adUrl = urlParams.get('ad'); // YA NO TIENE EL "||", AHORA ESTÁ LIMPIO
        
        const iframe = document.getElementById('videoFrame');
        const timerDiv = document.getElementById('timer');
        const segSpan = document.getElementById('seg');
        const overlay = document.getElementById('overlay');
        const btn = document.getElementById('btn-entrar');

        btn.onclick = () => {
            overlay.style.display = 'none'; 
            iframe.style.display = 'block'; 
            
            if (videoUrl) {
                // SI MANDASTE PUBLICIDAD EN EL LINK
                if (adUrl) {
                    iframe.src = adUrl;
                    timerDiv.style.display = 'block';
                    
                    let timeLeft = 7;
                    const countdown = setInterval(() => {
                        timeLeft--;
                        segSpan.innerText = timeLeft;
                        
                        if (timeLeft <= 0) {
                            clearInterval(countdown);
                            timerDiv.style.display = 'none';
                            iframe.src = videoUrl; // Salto a la película
                        }
                    }, 1000);
                } 
                // SI NO MANDASTE PUBLICIDAD (VA DIRECTO)
                else {
                    iframe.src = videoUrl;
                }
            }
        };
    </script>
</body>
</html>
