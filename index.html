<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        #timer-box { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.7); color: #fff; 
            padding: 8px 15px; border-radius: 5px; z-index: 100;
            border: 1px solid #555; pointer-events: none;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="timer-box" class="hidden">Publicidad: <span id="count">7</span>s</div>
    
    <iframe id="adFrame" class="hidden" allow="autoplay; fullscreen"></iframe>

    <iframe id="videoFrame" class="hidden" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen 
            sandbox="allow-forms allow-scripts allow-same-origin allow-presentation">
    </iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const adUrl = urlParams.get('ad');
        const videoUrl = urlParams.get('video');
        
        const adFrame = document.getElementById('adFrame');
        const videoFrame = document.getElementById('videoFrame');
        const timerBox = document.getElementById('timer-box');
        const countSpan = document.getElementById('count');

        if (videoUrl) {
            if (adUrl) {
                // 1. Mostrar y cargar el video de publicidad
                adFrame.src = adUrl;
                adFrame.classList.remove('hidden');
                timerBox.classList.remove('hidden');

                let timeLeft = 7; // Segundos que durará el video de publicidad
                const countdown = setInterval(() => {
                    timeLeft--;
                    countSpan.innerText = timeLeft;
                    
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        // 2. Quitar publicidad y cargar tu video con tus bloqueos
                        adFrame.classList.add('hidden');
                        adFrame.src = ""; // Detener el audio del anuncio
                        timerBox.classList.add('hidden');
                        
                        videoFrame.src = videoUrl;
                        videoFrame.classList.remove('hidden');
                    }
                }, 1000);
            } else {
                // Si no hay publicidad en el link, cargar directo tu video
                videoFrame.src = videoUrl;
                videoFrame.classList.remove('hidden');
            }
        } else {
            document.body.innerHTML = '<p style="color:white;text-align:center;margin-top:20%">Enlace no encontrado</p>';
        }
    </script>
</body>
</html>
