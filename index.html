<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        iframe { width: 100%; height: 100%; border: none; }
        #timer { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.8); color: white; 
            padding: 10px; border-radius: 5px; z-index: 10;
        }
    </style>
</head>
<body>

    <div id="timer" style="display: none;">Publicidad: <span id="seg">7</span>s</div>

    <iframe id="videoFrame" 
            allow="autoplay; fullscreen; picture-in-picture" 
            allowfullscreen 
            sandbox="allow-forms allow-scripts allow-same-origin allow-presentation">
    </iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        // Usamos el nombre del archivo directamente como me pediste
        const adUrl = "En espera de capitulo.mp4"; 
        
        const iframe = document.getElementById('videoFrame');
        const timerDiv = document.getElementById('timer');
        const segSpan = document.getElementById('seg');

        if (videoUrl) {
            // 1. Cargamos la publicidad en el mismo iframe
            iframe.src = adUrl;
            timerDiv.style.display = 'block';
            
            let timeLeft = 7;
            const countdown = setInterval(() => {
                timeLeft--;
                segSpan.innerText = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    timerDiv.style.display = 'none';
                    // 2. Cambiamos el contenido del mismo iframe al video principal
                    iframe.src = videoUrl;
                }
            }, 1000);
        } else {
            document.body.innerHTML = '<p style="color:white;text-align:center">Enlace no encontrado</p>';
        }
    </script>
</body>
</html>
