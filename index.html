<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; }
        #overlay { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; background: #000; z-index: 2000; }
        #btn-entrar { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #8e44ad; color: white; border: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        #timer { position: absolute; top: 20px; right: 20px; background: rgba(0,0,0,0.8); color: white; padding: 10px; border-radius: 5px; z-index: 2001; display: none; }
    </style>
</head>
<body>
    <div id="overlay"><button id="btn-entrar">VER ESTRENO</button></div>
    <div id="timer">Publicidad: <span id="seg">21</span>s</div>
    
    <iframe id="adFrame" allow="autoplay; fullscreen"></iframe>
    
    <iframe id="videoFrame" allow="autoplay; fullscreen" sandbox="allow-forms allow-scripts allow-same-origin allow-presentation"></iframe>

    <script>
        const params = new URLSearchParams(window.location.search + window.location.hash.replace('#', '&'));
        const videoUrl = params.get('video');
        const adUrl = params.get('ad');
        
        const videoFrame = document.getElementById('videoFrame');
        const adFrame = document.getElementById('adFrame');
        const timerDiv = document.getElementById('timer');
        const segSpan = document.getElementById('seg');
        const overlay = document.getElementById('overlay');

        document.getElementById('btn-entrar').onclick = () => {
            overlay.style.display = 'none'; 
            
            if (videoUrl) {
                if (adUrl) {
                    // Cargamos AMBOS al tiempo, pero el de la peli se queda oculto
                    adFrame.src = adUrl + (adUrl.includes('?') ? '&' : '?') + 'autoplay=1';
                    adFrame.style.display = 'block';
                    
                    videoFrame.src = videoUrl; // La peli ya se va cargando de fondo
                    
                    timerDiv.style.display = 'block';
                    let timeLeft = 21; 
                    
                    const countdown = setInterval(() => {
                        timeLeft--;
                        segSpan.innerText = timeLeft;
                        if (timeLeft <= 0) {
                            clearInterval(countdown);
                            timerDiv.style.display = 'none';
                            
                            // MATAMOS EL AD Y MOSTRAMOS LA PELI
                            adFrame.style.display = 'none';
                            adFrame.src = "about:blank";
                            
                            videoFrame.style.display = 'block';
                        }
                    }, 1000);
                } else {
                    videoFrame.src = videoUrl;
                    videoFrame.style.display = 'block';
                }
            }
        };
    </script>
</body>
</html>
