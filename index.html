<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO Custom</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
}

/* CONTENEDOR */
#player {
    position: relative;
    width: 100%;
    height: 100vh;
    background: black;
}

/* VIDEO E IFRAME AUTOMÁTICO */
video, iframe {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
    border: none;
    position: absolute;
    top: 0;
    left: 0;
}

/* CAPA CONTROLES */
.controls {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    box-sizing: border-box;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    opacity: 0;
    transition: 0.3s;
    z-index: 10;
}

/* MOSTRAR CONTROLES */
#player:hover .controls {
    opacity: 1;
}

/* BOTONES OPTIMIZADOS (FUERZA BLANCO Y MORADO NEÓN, ELIMINA NARANJA) */
.btn {
    color: white !important;
    font-size: 18px;
    cursor: pointer;
    margin-right: 15px;
    text-shadow: 0 0 5px rgba(142, 68, 173, 0.8);
    outline: none;
    -webkit-tap-highlight-color: transparent;
    display: inline-block;
    user-select: none;
    transition: color 0.1s ease;
}

.btn:hover, .btn:focus, .btn:active {
    color: #bc13fe !important;
    text-shadow: 0 0 10px #bc13fe;
}

/* BARRA DE PROGRESO PREMIUM EN MORADO */
.progress {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    margin-bottom: 10px;
    border-radius: 3px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #8e44ad;
    box-shadow: 0 0 10px #bc13fe;
    transition: width 0.1s linear;
}

/* CENTRO PLAY PREMIUM */
.center-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(142, 68, 173, 0.3);
    border: 2px solid #bc13fe;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
    z-index: 5;
    box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
}

.center-play::before {
    content: '';
    margin-left: 5px;
    border-left: 25px solid white;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
}

.center-play:hover {
    background: rgba(188, 19, 254, 0.6);
    transform: translate(-50%, -50%) scale(1.1);
}

.hidden {
    display: none !important;
}
</style>
</head>

<body oncontextmenu="return false">

<div id="player">

    <video id="video"></video>

    <div id="centerPlay" class="center-play"></div>

    <div class="controls" id="custom-controls">

        <div class="progress" id="progress">
            <div class="progress-bar" id="bar"></div>
        </div>

        <span class="btn" id="playBtn">▶</span>
        <span class="btn" id="muteBtn">🔊</span>
        <span class="btn" id="fullscreenBtn">⛶</span>

    </div>

</div>

<script>
const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const muteBtn = document.getElementById("muteBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const centerPlay = document.getElementById("centerPlay");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");
const capaControles = document.getElementById("custom-controls");

// URL OBTIENE PARÁMETROS
const params = new URLSearchParams(window.location.search);
let url = params.get("video");

// DETECTAR TIPO DE FLUJO
function tipo(u) {
    if (!u) return "vacio";
    u = u.toLowerCase();
    if (u.includes("drive.google.com")) return "drive";
    if (u.includes(".m3u8")) return "hls";
    if (u.includes(".mpd")) return "dash";
    return "mp4";
}

// CARGAR FUENTE RESPECTANDO TUS CONFIGURACIONES
function cargar(url) {
    if (!url) return;
    
    const t = tipo(url);

    if (t === "drive") {
        // Ocultar tus controles personalizados para evitar duplicación de barras
        centerPlay.classList.add("hidden");
        capaControles.classList.add("hidden");
        
        // Convertir enlaces /view a /preview de forma automática por estabilidad
        if (url.includes("/view")) {
            url = url.replace("/view", "/preview");
        }
        
        // Crear iframe dejando la URL limpia sin parámetros extras que alteren tu bloqueo del botón
        const iframe = document.createElement("iframe");
        iframe.src = url; 
        iframe.allow = "fullscreen";
        iframe.setAttribute("allowfullscreen", "true");
        
        video.replaceWith(iframe);
    } 
    
    else if (t === "hls") {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else {
            video.src = url;
        }
    }

    else if (t === "dash") {
        const player = dashjs.MediaPlayer().create();
        player.initialize(video, url, false);
    }

    else {
        video.src = url;
    }
}

cargar(url);

// LÓGICA DE PLAY / PAUSE MEJORADA (Fija el comportamiento en PC y Móvil)
function togglePlay(e) {
    if (!video || video.tagName === "IFRAME") return;
    
    if (video.paused) {
        video.play();
    } else {
        video.pause();
    }
    
    // Quita el foco del mouse en PC para evitar congelamientos de color naranja
    if (e && e.target) {
        e.target.blur();
    }
}

if (video && video.tagName !== "IFRAME") {
    playBtn.onclick = (e) => togglePlay(e);
    centerPlay.onclick = (e) => togglePlay(e);
    video.onclick = (e) => togglePlay(e);

    video.addEventListener("play", () => {
        playBtn.textContent = "⏸";
        centerPlay.classList.add("hidden");
    });

    video.addEventListener("pause", () => {
        playBtn.textContent = "▶";
        centerPlay.classList.remove("hidden");
    });

    muteBtn.onclick = () => {
        video.muted = !video.muted;
        muteBtn.textContent = video.muted ? "🔇" : "🔊";
    };

    video.addEventListener("timeupdate", () => {
        const percent = (video.currentTime / video.duration) * 100;
        bar.style.width = percent + "%";
    });

    progress.onclick = (e) => {
        const rect = progress.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    };
}

// FULLSCREEN INTEGRAL (Sirve tanto para video nativo como para iframe de Drive)
fullscreenBtn.onclick = () => {
    if (!document.fullscreenElement) {
        document.getElementById("player").requestFullscreen().catch(err => {
            console.log("Error al activar pantalla completa: ", err);
        });
    } else {
        document.exitFullscreen();
    }
};
</script>

</body>
</html>
