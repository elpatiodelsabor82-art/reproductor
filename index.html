<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor KikeFlix</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        iframe, video { width: 100%; height: 100%; border: none; position: absolute; top: 0; left: 0; }
        #ad-overlay { 
            position: absolute; top: 20px; right: 20px; 
            background: rgba(0,0,0,0.85); color: #fff; 
            padding: 12px 20px; border-radius: 4px; z-index: 1000;
            border: 1px solid #444; font-size: 14px;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="ad-overlay" class="hidden">Publicidad: <span id="timer">5</span>s</div>
    
    <video id="nativeVideo" class="hidden" autoplay playsinline></video>
    
    <iframe id="videoFrame" class="hidden" allow="autoplay; fullscreen" allowfullscreen></iframe>

    <script>
        const params = new URLSearchParams(window.location.search);
        const adUrl = params.get('ad');
        const mainUrl = params.get('video');
        
        const videoFrame = document.getElementById('videoFrame');
        const nativeVideo = document.getElementById('nativeVideo');
        const adOverlay = document.getElementById('ad-overlay');
        const timerSpan = document.getElementById('timer');

        function cargarContenido(url) {
            // Si es un link de Drive o embed, usamos IFRAME
            if (url.includes('drive.google.com') || url.includes('myvidplay')) {
                videoFrame.src = url;
                videoFrame.classList.remove('hidden');
                nativeVideo.classList.add('hidden');
            } else {
                // Si es un archivo directo (MP4), usamos el tag VIDEO para mejor control
                nativeVideo.src = url;
                nativeVideo.classList.remove('hidden');
                videoFrame.classList.add('hidden');
                nativeVideo.play();
            }
        }

        if (mainUrl) {
            if (adUrl) {
                // Mostrar publicidad primero
                adOverlay.classList.remove('hidden');
                cargarContenido(adUrl);

                let timeLeft = 7; // Duración sugerida para el anuncio
                const countdown = setInterval(() => {
                    timeLeft--;
                    timerSpan.innerText = timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(countdown);
                        adOverlay.classList.add('hidden');
                        cargarContenido(mainUrl);
                    }
                }, 1000);
            } else {
                cargarContenido(mainUrl);
            }
        } else {
            document.body.innerHTML = '<p style="color:white;text-align:center;margin-top:20vh;">Esperando contenido...</p>';
        }
    </script>
</body>
</html>
