<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- DASH -->
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
}

/* CONTENEDOR */
#contenedor {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #000;
    overflow: hidden;
}

/* VIDEO / IFRAME FULL */
video, iframe {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border: none;
}
</style>
</head>

<body>

<div id="contenedor"></div>

<script>
const contenedor = document.getElementById("contenedor");

const params = new URLSearchParams(window.location.search);
let url = params.get("video");

if (!url) {
    contenedor.innerHTML = "<h2 style='color:white;text-align:center'>No hay video</h2>";
}

/* DETECTAR TIPO */
function tipoVideo(u) {
    u = u.toLowerCase();

    if (u.includes("drive.google.com")) return "drive";
    if (u.includes(".m3u8")) return "hls";
    if (u.includes(".mpd")) return "dash";
    if (u.match(/\.(mp4|webm|ogg)$/)) return "mp4";

    return "iframe";
}

/* CARGAR */
function cargar(url) {

    const tipo = tipoVideo(url);

    if (tipo === "drive") {

        const preview = url.replace("/view", "/preview");

        contenedor.innerHTML = `
            <iframe src="${preview}" allow="autoplay; fullscreen"></iframe>
        `;
    }

    else if (tipo === "mp4") {

        contenedor.innerHTML = `
            <video id="video" controls autoplay>
                <source src="${url}">
            </video>
        `;

        const video = document.getElementById("video");

        // click en video play/pause
        video.onclick = () => {
            if (video.paused) video.play();
            else video.pause();
        };
    }

    else if (tipo === "hls") {

        contenedor.innerHTML = `<video id="video" controls autoplay></video>`;
        const video = document.getElementById("video");

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(video);
        } else {
            video.src = url;
        }

        video.onclick = () => {
            if (video.paused) video.play();
            else video.pause();
        };
    }

    else if (tipo === "dash") {

        contenedor.innerHTML = `<video id="video" controls autoplay></video>`;
        const video = document.getElementById("video");

        const player = dashjs.MediaPlayer().create();
        player.initialize(video, url, false);

        video.onclick = () => {
            if (video.paused) video.play();
            else video.pause();
        };
    }

    else {

        contenedor.innerHTML = `
            <iframe src="${url}" allow="autoplay; fullscreen"></iframe>
        `;
    }
}

/* INICIAR */
cargar(url);
</script>

</body>
</html>
