<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO Custom</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: black;
    height: 100%;
    overflow: hidden;
    font-family: sans-serif;
}

/* CONTENEDOR PRINCIPAL */
#player {
    position: relative;
    width: 100%;
    height: 100vh;
    background: black;
}

/* CONTENEDOR RELATIVO PARA ENLACES EXTERNOS / IFRAMES */
.video-wrapper {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: none;
}

video, iframe {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: black;
    border: none;
    position: absolute;
    top: 0;
    left: 0;
}

/* CAPA INVISIBLE ANTI-FLECHA (PARA DRIVE) */
#bloqueo-flecha {
    position: absolute;
    top: 0;
    right: 0;
    width: 180px;  
    height: 60px;  
    background: rgba(0,0,0,0); 
    z-index: 1000; 
    display: none; 
}

/* CAPA CONTROLES NATIVOS (HLS/DASH/MP4) */
.controls {
    position: absolute;
    bottom: 0;
    width: 100%;
    padding: 15px;
    box-sizing: border-box;
    background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
    opacity: 0;
    transition: 0.3s;
    z-index: 10;
}

#player:hover .controls {
    opacity: 1;
}

/* BOTONES PREMIUM */
.btn {
    color: white !important;
    font-size: 18px;
    cursor: pointer;
    margin-right: 15px;
    text-shadow: 0 0 5px rgba(142, 68, 173, 0.8);
    outline: none;
    -webkit-tap-highlight-color: transparent;
    display: inline-block;
    user-select: none;
    transition: color 0.1s ease;
}

.btn:hover, .btn:focus, .btn:active {
    color: #bc13fe !important;
    text-shadow: 0 0 10px #bc13fe;
}

/* BARRA DE PROGRESO */
.progress {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    margin-bottom: 10px;
    border-radius: 3px;
    overflow: hidden;
}

.progress-bar {
    height: 100%;
    width: 0%;
    background: #8e44ad;
    box-shadow: 0 0 10px #bc13fe;
    transition: width 0.1s linear;
}

/* CENTRO PLAY NATIVO */
.center-play {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(142, 68, 173, 0.3);
    border: 2px solid #bc13fe;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.3s;
    z-index: 5;
    box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
    display: none; 
}

.center-play::before {
    content: '';
    margin-left: 5px;
    border-left: 25px solid white;
    border-top: 15px solid transparent;
    border-bottom: 15px solid transparent;
}

.center-play:hover {
    background: rgba(188, 19, 254, 0.6);
    transform: translate(-50%, -50%) scale(1.1);
}

/* OVERLAY INICIAL DE ENTRADA */
#overlay { 
    position: absolute; 
    width: 100%; 
    height: 100%; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    background: #000; 
    z-index: 2000; 
}

#btn-entrar { 
    width: 100px;
    height: 100px;
    cursor: pointer; 
    background: #8e44ad; 
    color: white; 
    border: none; 
    border-radius: 50%; 
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.2s, background 0.3s;
    box-shadow: 0 0 20px rgba(142, 68, 173, 0.6);
}

#btn-entrar:hover { background: #a55eca; transform: scale(1.1); }
.play-icon { width: 0; height: 0; border-top: 20px solid transparent; border-bottom: 20px solid transparent; border-left: 35px solid white; margin-left: 8px; }

/* TIMER PUBLICIDAD */
#timer { 
    position: absolute; 
    top: 20px; 
    right: 20px; 
    background: rgba(0,0,0,0.8); 
    color: white; 
    padding: 10px; 
    border-radius: 5px; 
    z-index: 2010; 
    display: none; 
}

.hidden {
    display: none !important;
}
</style>
</head>

<body oncontextmenu="return false">

<div id="player">

    <div id="overlay">
        <button id="btn-entrar">
            <div class="play-icon"></div>
        </button>
    </div>

    <div id="timer">Publicidad: <span id="seg">21</span>s</div>

    <div class="video-wrapper" id="wrapper-externo">
        <div id="bloqueo-flecha"></div>
        <iframe id="videoFrame" allow="autoplay; fullscreen" allowfullscreen referrerpolicy="no-referrer"></iframe>
    </div>

    <video id="video" style="display: none;"></video>

    <div id="centerPlay" class="center-play"></div>

    <div class="controls" id="custom-controls" style="display: none;">
        <div class="progress" id="progress">
            <div class="progress-bar" id="bar"></div>
        </div>
        <span class="btn" id="playBtn">▶</span>
        <span class="btn" id="muteBtn">🔊</span>
        <span class="btn" id="fullscreenBtn">⛶</span>
    </div>

</div>

<script>
const video = document.getElementById("video");
const playBtn = document.getElementById("playBtn");
const muteBtn = document.getElementById("muteBtn");
const fullscreenBtn = document.getElementById("fullscreenBtn");
const centerPlay = document.getElementById("centerPlay");
const progress = document.getElementById("progress");
const bar = document.getElementById("bar");
const capaControles = document.getElementById("custom-controls");

// Elementos de bloqueo e iframe
const wrapperExterno = document.getElementById('wrapper-externo');
const iframe = document.getElementById('videoFrame');
const timerDiv = document.getElementById('timer');
const segSpan = document.getElementById('seg');
const overlay = document.getElementById('overlay');
const bloqueoFlecha = document.getElementById('bloqueo-flecha');

// Capturar parámetros URL
const params = new URLSearchParams(window.location.search + window.location.hash.replace('#', '&'));
let videoUrl = params.get("video");
let adUrl = params.get("ad");

// DETECTAR FLUJO INTELIGENTE ACTUALIZADO
function tipo(u) {
    if (!u) return "vacio";
    u = u.toLowerCase();
    if (u.includes("drive.google.com")) return "drive";
    if (u.includes(".m3u8")) return "hls";
    if (u.includes(".mpd")) return "dash";
    if (u.includes(".mp4")) return "mp4";
    return "embed"; // Cualquier otra URL (como vidplay, youtube, moshahda, etc.) se tratará como Embed protegido
}

const tipoContenido = tipo(videoUrl);

// AL DAR CLIC EN ENTRAR
document.getElementById('btn-entrar').onclick = () => {
    overlay.style.display = 'none'; 

    if (!videoUrl) return;

    if (adUrl) {
        wrapperExterno.style.display = 'block';
        let cleanAdUrl = adUrl.includes('?') ? adUrl + '&autoplay=1' : adUrl + '?autoplay=1';
        
        iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin');
        iframe.src = cleanAdUrl;
        
        timerDiv.style.display = 'block';
        let timeLeft = 21; 
        
        const countdown = setInterval(() => {
            timeLeft--;
            segSpan.innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerDiv.style.display = 'none';
                ejecutarContenidoReal();
            }
        }, 1000);
    } else {
        ejecutarContenidoReal();
    }
};

// FUNCIÓN DE PROCESAMIENTO INTEGRAL (SOPORTA DRIVE, DIRECTOS Y EMBEDS CON ESCUDO ANTI-VIRUS)
function ejecutarContenidoReal() {
    
    // CASO 1: GOOGLE DRIVE
    if (tipoContenido === "drive") {
        wrapperExterno.style.display = 'block';
        iframe.removeAttribute('sandbox'); // Drive necesita permisos libres para sus botones internos
        bloqueoFlecha.style.display = 'block'; // Capa anti-flecha encima
        
        if (videoUrl.includes("/view")) {
            videoUrl = videoUrl.replace("/view", "/preview");
        }
        let urlConAutoplay = videoUrl + (videoUrl.includes("?") ? "&" : "?") + "autoplay=1";
        iframe.src = urlConAutoplay;
    } 
    
    // CASO 2: EMBEDS EXTERNOS (VidPlay, servidores de películas, etc.)
    else if (tipoContenido === "embed") {
        wrapperExterno.style.display = 'block';
        bloqueoFlecha.style.display = 'none'; // No se necesita bloquear flecha de Drive aquí
        
        // ESCUDO ANTI-POPUPS: Le permitimos ejecutar los scripts del video pero le PROHIBIMOS abrir nuevas pestañas o ventanas de virus
        iframe.setAttribute('sandbox', 'allow-scripts allow-forms allow-same-origin'); 
        
        let urlConAutoplay = videoUrl + (videoUrl.includes("?") ? "&" : "?") + "autoplay=1";
        iframe.src = urlConAutoplay;
    }
    
    // CASO 3: STREAMING O VIDEOS DIRECTOS (HLS, DASH, MP4)
    else {
        wrapperExterno.style.display = 'none'; 
        video.style.display = 'block';          
        centerPlay.style.display = 'flex';       
        capaControles.style.display = 'block';   
        
        if (tipoContenido === "hls") {
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(videoUrl);
                hls.attachMedia(video);
            } else {
                video.src = videoUrl;
            }
        }
        else if (tipoContenido === "dash") {
            const player = dashjs.MediaPlayer().create();
            player.initialize(video, videoUrl, false);
        }
        else {
            video.src = videoUrl;
        }
        
        video.play();
    }
}

// LÓGICA DE CONTROLES NATIVOS (Solo para streaming directo)
function togglePlay(e) {
    if (!video || video.style.display === "none") return;
    
    if (video.paused) {
        video.play();
    } else {
        video.pause();
    }
    
    if (e && e.target) {
        e.target.blur();
    }
}

if (video) {
    playBtn.onclick = (e) => togglePlay(e);
    centerPlay.onclick = (e) => togglePlay(e);
    video.onclick = (e) => togglePlay(e);

    video.addEventListener("play", () => {
        playBtn.textContent = "⏸";
        centerPlay.classList.add("hidden");
    });

    video.addEventListener("pause", () => {
        playBtn.textContent = "▶";
        centerPlay.classList.remove("hidden");
    });

    muteBtn.onclick = () => {
        video.muted = !video.muted;
        muteBtn.textContent = video.muted ? "🔇" : "🔊";
    };

    video.addEventListener("timeupdate", () => {
        const percent = (video.currentTime / video.duration) * 100;
        bar.style.width = percent + "%";
    });

    progress.onclick = (e) => {
        const rect = progress.getBoundingClientRect();
        const pos = (e.clientX - rect.left) / rect.width;
        video.currentTime = pos * video.duration;
    };
}

// FULLSCREEN INTEGRAL
fullscreenBtn.onclick = () => {
    const elPlayer = document.getElementById("player");
    if (!document.fullscreenElement) {
        elPlayer.requestFullscreen().catch(err => {
            console.log("Error pantalla completa: ", err);
        });
    } else {
        document.exitFullscreen();
    }
};
</script>

</body>
</html>
