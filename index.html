<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player PRO</title>

<!-- HLS -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<!-- DASH -->
<script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
}

/* CONTENEDOR */
#contenedor {
    width: 100%;
    height: 100vh;
    background: #000;
    overflow: hidden;
}

/* VIDEO / IFRAME FULL */
video, iframe {
    width: 100%;
    height: 100%;
    object-fit: contain;
    border: none;
}

/* BLOQUEOS BÁSICOS */
video {
    -webkit-user-select: none;
    user-select: none;
}

/* Quitar botón descarga (Chrome) */
video::-webkit-media-controls-download-button {
    display: none !important;
}

/* Ajustes panel controles */
video::-webkit-media-controls-enclosure {
    overflow: hidden;
}

video::-webkit-media-controls-panel {
    width: calc(100% + 30px);
}
</style>
</head>

<body oncontextmenu="return false">

<div id="contenedor"></div>

<script>
const contenedor = document.getElementById("contenedor");

// 🔗 URL ?video=
const params = new URLSearchParams(window.location.search);
let url = params.get("video");

if (!url) {
    contenedor.innerHTML = "<h2 style='color:white;text-align:center'>No hay video</h2>";
}

/* DETECTAR TIPO */
function tipo(u) {
    u = u.toLowerCase();

    if (u.includes("drive.google.com")) return "drive";
    if (u.includes(".m3u8")) return "hls";
    if (u.includes(".mpd")) return "dash";
    if (u.match(/\.(mp4|webm|ogg)$/)) return "mp4";

    return "iframe";
}

/* CARGAR VIDEO */
function cargar(url) {

    const t = tipo(url);

    // DRIVE
    if (t === "drive") {
        const preview = url.replace("/view", "/preview");

        contenedor.innerHTML = `
            <iframe src="${preview}" allow="autoplay; fullscreen"></iframe>
        `;
    }

    // MP4 / WEBM
    else if (t === "mp4") {

        contenedor.innerHTML = `
            <video id="video" controls autoplay controlsList="nodownload noplaybackrate">
                <source src="${url}">
            </video>
        `;

        const v = document.getElementById("video");

        v.onclick = () => {
            if (v.paused) v.play();
            else v.pause();
        };
    }

    // HLS
    else if (t === "hls") {

        contenedor.innerHTML = `<video id="video" controls autoplay></video>`;
        const v = document.getElementById("video");

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(url);
            hls.attachMedia(v);
        } else {
            v.src = url;
        }

        v.onclick = () => {
            if (v.paused) v.play();
            else v.pause();
        };
    }

    // DASH
    else if (t === "dash") {

        contenedor.innerHTML = `<video id="video" controls autoplay></video>`;
        const v = document.getElementById("video");

        const player = dashjs.MediaPlayer().create();
        player.initialize(v, url, false);

        v.onclick = () => {
            if (v.paused) v.play();
            else v.pause();
        };
    }

    // IFRAME
    else {

        contenedor.innerHTML = `
            <iframe src="${url}" allow="autoplay; fullscreen"></iframe>
        `;
    }
}

// 🚀 INICIAR
cargar(url);
</script>

</body>
</html>
