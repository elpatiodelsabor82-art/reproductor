<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Estilos profesionales de Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <link href="https://unpkg.com/@videojs/themes@1.0.1/dist/city/index.css" rel="stylesheet" />
    
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; }
        .video-container { width: 100vw; height: 100vh; }
        .video-js { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="player-pro" class="video-js vjs-theme-city vjs-big-play-centered" controls preload="auto">
            <p class="vjs-no-js">Activa JavaScript para ver este video.</p>
        </video>
    </div>

    <!-- Scripts de motor profesional -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>

    <script>
        const params = new URLSearchParams(window.location.search);
        const videoUrl = params.get('video');

        if (videoUrl) {
            const player = videojs('player-pro', {
                fluid: false,
                responsive: true,
                playbackRates: [0.5, 1, 1.5, 2],
                html5: {
                    hls: { overrideNative: true }
                }
            });

            // Asignación inteligente del tipo de formato
            let type = 'video/mp4';
            if (videoUrl.includes('.m3u8')) type = 'application/x-mpegURL';
            else if (videoUrl.includes('.ts')) type = 'video/mp2t';
            else if (videoUrl.includes('.mkv')) type = 'video/x-matroska';

            player.src({ src: videoUrl, type: type });

            // Manejo profesional de errores
            player.on('error', function() {
                const error = player.error();
                console.error("Error del reproductor:", error);
                alert("El servidor de origen bloquea la reproducción directa (CORS).");
            });
        }
    </script>
</body>
</html>
