<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reproductor Premium - Protocolo Candela</title>
    <style>
        /* Estilos base con la estética neón y oscura */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0b10;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .player-container {
            width: 100%;
            max-width: 900px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* El contenedor que mantiene la proporción de aspecto 16:9 de la pantalla */
        .video-box {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Proporción 16:9 */
            height: 0;
            background-color: #000;
            border: 3px solid #bc13fe; /* Borde Morado Neón */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(188, 19, 254, 0.3);
        }

        /* Ajuste estricto para que el iframe o video ocupe todo el cuadro */
        .video-box iframe, .video-box video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
        }

        .error-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff4a4a;
            font-weight: bold;
            text-align: center;
            font-size: 1.1rem;
            text-shadow: 0 0 10px rgba(255, 74, 74, 0.5);
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="video-box" id="player-canvas">
        <!-- Aquí el script inyectará dinámicamente el reproductor -->
        <div class="error-msg">Cargando transmisión...</div>
    </div>
</div>

<script>
    function inicializarReproductor() {
        const contenedor = document.getElementById('player-canvas');
        
        // 1. Obtener los parámetros de la URL actual
        const parametrosURL = new URLSearchParams(window.location.search);
        let urlVideo = parametrosURL.get('video');

        // Verificar si se pasó el parámetro 'video'
        if (!urlVideo) {
            contenedor.innerHTML = '<div class="error-msg">⚠️ Error: No se detectó ninguna señal de video en la URL.</div>';
            return;
        }

        // Decodificar la URL por si viene con caracteres protegidos
        urlVideo = decodeURIComponent(urlVideo);

        // 2. Procesamiento inteligente si el enlace es de Google Drive
        if (urlVideo.includes('drive.google.com')) {
            
            // Si el enlace viene como /view o /preview, aseguramos que use /preview para que cargue el reproductor nativo de Drive sin trabas
            if (urlVideo.includes('/view')) {
                urlVideo = urlVideo.replace('/view', '/preview');
            }
            
            // Inyectamos el iframe optimizado para Drive con autoplay activado
            contenedor.innerHTML = `
                <iframe 
                    src="${urlVideo}${urlVideo.includes('?') ? '&' : '?'}autoplay=1" 
                    allow="autoplay; fullscreen" 
                    allowfullscreen>
                </iframe>
            `;
            
        } else if (urlVideo.toLowerCase().includes('.mp4') || urlVideo.toLowerCase().includes('.m3u8')) {
            // 3. Si es un enlace directo a archivo de video físico (.mp4 o streaming directo)
            contenedor.innerHTML = `
                <video controls autoplay playsinline style="width:100%; height:100%;">
                    <source src="${urlVideo}" type="video/mp4">
                    Tu navegador no soporta reproducción directa.
                </video>
            `;
        } else {
            // 4. Cualquier otra URL externa (Embeds de terceros, YouTube, etc.)
            const urlFinal = urlVideo.includes('?') ? urlVideo + '&autoplay=1' : urlVideo + '?autoplay=1';
            contenedor.innerHTML = `
                <iframe 
                    src="${urlFinal}" 
                    allow="autoplay; fullscreen" 
                    allowfullscreen>
                </iframe>
            `;
        }
    }

    // Ejecutar la función apenas cargue la página
    window.onload = inicializarReproductor;
</script>

</body>
</html>
