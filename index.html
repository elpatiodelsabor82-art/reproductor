<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reproductor Universal</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>
</head>
<body>

    <video id="player" class="video-js vjs-default-skin" controls preload="auto" width="100%" height="400px">
        </video>

    <script>
        const params = new URLSearchParams(window.location.search);
        const url = params.get('video'); // Aquí pones tu link: index.html?video=TU_LINK

        var player = videojs('player', {
            html5: {
                hls: { overrideNative: true } // Esto hace que funcione m3u8 y .ts
            }
        });

        if (url) {
            // Detección automática de formato
            let type = 'video/mp4'; 
            if (url.includes('.m3u8')) type = 'application/x-mpegURL';
            if (url.includes('.ts')) type = 'video/mp2t';
            if (url.includes('.mkv')) type = 'video/x-matroska';
            
            player.src({ src: url, type: type });
            player.play().catch(e => console.log("Esperando interacción..."));
        }
    </script>
</body>
</html>
